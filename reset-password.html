<style>
  :root {
    --bg: #f6f6f4;
    --surface: #ffffff;
    --surface-soft: #f2f2ee;
    --text: #0f0f0f;
    --muted: #6d6d67;
    --border: rgba(15, 15, 15, 0.1);
    --shadow: 0 30px 70px rgba(15, 15, 15, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Urbanist", sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top left, rgba(15, 15, 15, 0.08), transparent 26%), linear-gradient(180deg, #fbfbf8 0%, var(--bg) 100%);
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .card {
    width: min(100%, 520px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    box-shadow: var(--shadow);
    padding: 34px 28px;
  }
  .badge {
    display: inline-flex;
    padding: 10px 14px;
    border-radius: 999px;
    background: #0f0f0f;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  h1 {
    margin: 18px 0 8px;
    font-size: clamp(2rem, 4vw, 2.8rem);
    letter-spacing: -0.05em;
  }
  p {
    margin: 0 0 24px;
    color: var(--muted);
    line-height: 1.7;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    height: 54px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface-soft);
    padding: 0 16px;
    font: inherit;
    color: var(--text);
    outline: none;
  }
  .field input:focus {
    border-color: #0f0f0f;
    box-shadow: 0 0 0 4px rgba(15,15,15,0.08);
    background: #fff;
  }
  .primary-btn {
    width: 100%;
    height: 56px;
    border: 0;
    border-radius: 18px;
    background: #0f0f0f;
    color: #fff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }
  .primary-btn:disabled { opacity: .6; cursor: wait; }
  .status {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 16px;
    font-size: 14px;
  }
  .status.show { display: block; }
  .status.success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.24); color: #166534; }
  .status.error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.24); color: #991b1b; }
  .back-link {
    display: inline-block;
    margin-top: 18px;
    color: #0f0f0f;
    text-decoration: none;
    font-weight: 700;
  }
